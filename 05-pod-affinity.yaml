apiVersion: v1
kind: Pod
metadata: 
   name: pod-1
   labels:
    tier: database
spec: 
   containers: 
   - name: nginx
     image: nginx

---
apiVersion: v1
kind: Pod
metadata: 
   name: pod-2
   labels:
    tier: backend
spec:
   affinity:
    podAffinity:
      #Hard rule
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: security
            operator: In
            values:
            - S1
        topologyKey: topology.kubernetes.io/zone
   containers: 
   - name: nginx
     image: nginx 