apiVersion: v1
kind: Pod
metadata:
  name: nginx-anti-affinity
  labels:
    env: test
spec: 
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone 
            operator: NotIn
            values:
            - us-east-1d   
          - key: project
            operator: In
            values:
            - amazon
  containers: 
  - name: nginx
    image: nginx

  tolerations:
  - key: "hardware"
    operator: "Equal"
    value: "gpu"
    effect: "NoExecute"