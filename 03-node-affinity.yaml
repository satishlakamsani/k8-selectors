apiVersion: v1
kind: Pod
metadata:
  name: nginx-affinity
  labels:
    env: test
spec: 
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone 
            operator: In
            values:
            - us-east-1d   
            - us-east-1c
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - roboshopp  
      - weight: 10
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - amazon                   
  containers: 
  - name: nginx
    image: nginx
  